      - generic [ref=e768]:
        - generic [ref=e769]:
          - button "A Escola Habilidade fica bem localizada em São José?" [expanded] [ref=e770] [cursor=pointer]:
            - generic [ref=e771]: A Escola Habilidade fica bem localizada em São José?
            - img [ref=e772]
          - region [ref=e774]:
            - generic [ref=e775]: Sim! Estamos estrategicamente localizados no centro de São José, próximo ao Terminal Central, Shopping Pátio São José e fácil acesso pela BR-101. Nossa localização privilegiada permite chegada fácil por transporte público (várias linhas de ônibus) e oferece estacionamento gratuito para estudantes. Atendemos toda a Grande Florianópolis, especialmente São José, Palhoça e Biguaçu.
        - generic [ref=e776]:
          - button "Vocês têm parcerias com empresas de São José e região?" [ref=e777] [cursor=pointer]:
            - generic [ref=e778]: Vocês têm parcerias com empresas de São José e região?
            - img [ref=e779]
          - generic [ref=e781]: Sim! Temos parcerias ativas com mais de 50 empresas da Grande Florianópolis, incluindo escritórios de arquitetura, agências de marketing, desenvolvedoras e empresas de tecnologia. Nossos alunos desenvolvem projetos reais durante o curso e muitos são contratados diretamente por empresas parceiras. Mantemos um programa de indicação profissional exclusivo.
        - generic [ref=e782]:
          - button "Qual a diferença entre curso técnico e curso profissionalizante na Escola Habilidade?" [ref=e783] [cursor=pointer]:
            - generic [ref=e784]: Qual a diferença entre curso técnico e curso profissionalizante na Escola Habilidade?
            - img [ref=e785]
          - generic [ref=e787]: Nossos cursos profissionalizantes são 100% focados na prática profissional. Diferente de cursos técnicos convencionais, investimos 80% do tempo em projetos reais e apenas 20% em teoria. Isso significa que você sai preparado para o mercado de trabalho desde o primeiro dia, com portfolio robusto e experiência prática que os empregadores valorizam.
        - generic [ref=e788]:
          - button "Quais cursos a Escola Habilidade oferece?" [ref=e789] [cursor=pointer]:
            - generic [ref=e790]: Quais cursos a Escola Habilidade oferece?
            - img [ref=e791]
          - generic [ref=e793]: "Oferecemos 6 cursos principais: Projetista (SketchUp/AutoCAD), Edição de Vídeo, Design Gráfico, Programação, Marketing Digital e BI/Inteligência Artificial. Todos são cursos práticos com projetos reais, certificação reconhecida pelo mercado e suporte para colocação profissional. Cada curso é personalizado conforme demanda do mercado regional."
        - generic [ref=e794]:
          - button "Como é a metodologia de ensino da Escola Habilidade?" [ref=e795] [cursor=pointer]:
            - generic [ref=e796]: Como é a metodologia de ensino da Escola Habilidade?
            - img [ref=e797]
          - generic [ref=e799]: Nossa metodologia única "Prática Primeiro" combina projetos reais com mentoria individualizada. Turmas pequenas (máximo 12 alunos), professores especialistas do mercado e 80% do tempo dedicado à prática. Você desenvolve portfolio profissional durante o curso e recebe orientação personalizada para sua área de interesse.
        - generic [ref=e800]:
          - button "Por que a Escola Habilidade tem avaliação 5.0 estrelas?" [ref=e801] [cursor=pointer]:
            - generic [ref=e802]: Por que a Escola Habilidade tem avaliação 5.0 estrelas?
            - img [ref=e803]
          - generic [ref=e805]: "Nossa nota máxima reflete o compromisso com resultados reais: metodologia prática, acompanhamento individualizado e foco na preparação para o mercado de trabalho. Diferente de instituições grandes, priorizamos qualidade sobre quantidade, com turmas reduzidas e atenção personalizada a cada aluno."
        - generic [ref=e806]:
          - button "A Escola Habilidade ajuda na colocação profissional?" [ref=e807] [cursor=pointer]:
            - generic [ref=e808]: A Escola Habilidade ajuda na colocação profissional?
            - img [ref=e809]
          - generic [ref=e811]: Sim! Oferecemos apoio através de nossa rede de empresas parceiras que conhecem a qualidade dos nossos alunos, programa de preparação para freelancers com projetos reais e orientação para desenvolvimento de carreira. Nosso foco é preparar você com as habilidades e portfolio que o mercado busca.
        - generic [ref=e812]:
          - button "Qual curso tem mais chance de conseguir emprego rápido em São José?" [ref=e813] [cursor=pointer]:
            - generic [ref=e814]: Qual curso tem mais chance de conseguir emprego rápido em São José?
            - img [ref=e815]
          - generic [ref=e817]: Nossos cursos de Projetista (SketchUp + Enscape), Programação, Design Gráfico e Marketing Digital são os que mais colocam profissionais no mercado na Grande Florianópolis. Com metodologia 80% prática, você desenvolve portfolio real durante o curso. Estatisticamente, cursos técnicos como Desenvolvimento de Sistemas têm 76,7% de empregabilidade, mas nosso diferencial é a preparação específica para o mercado local.
        - generic [ref=e818]:
          - button "A Escola Habilidade oferece cursos técnicos gratuitos como o SENAI?" [ref=e819] [cursor=pointer]:
            - generic [ref=e820]: A Escola Habilidade oferece cursos técnicos gratuitos como o SENAI?
            - img [ref=e821]
          - generic [ref=e823]: Nossos cursos são investimento acessível com resultado superior ao ensino técnico tradicional. Diferente dos cursos gratuitos que priorizam teoria, oferecemos mentoria individualizada, turmas pequenas e projetos reais. O retorno do investimento acontece rapidamente através das oportunidades de trabalho e freelances que nossos alunos conseguem.
        - generic [ref=e824]:
          - button "Qual a diferença da Escola Habilidade para o SENAI e IFSC de São José?" [ref=e825] [cursor=pointer]:
            - generic [ref=e826]: Qual a diferença da Escola Habilidade para o SENAI e IFSC de São José?
            - img [ref=e827]
          - generic [ref=e829]: Enquanto instituições técnicas focam em certificação, priorizamos empregabilidade real. Turmas pequenas vs. turmas de 40+ alunos, professores do mercado vs. professores acadêmicos, projetos reais vs. exercícios teóricos. Nossos alunos começam a trabalhar antes mesmo de formar, diferente do modelo tradicional.
        - generic [ref=e830]:
          - button "Por que escolher curso profissionalizante ao invés de curso técnico em São José?" [ref=e831] [cursor=pointer]:
            - generic [ref=e832]: Por que escolher curso profissionalizante ao invés de curso técnico em São José?
            - img [ref=e833]
          - generic [ref=e835]: Cursos profissionalizantes são mais rápidos, práticos e alinhados com demandas reais das empresas. Não há burocracia de certificação técnica, permitindo atualização constante do conteúdo. Você aprende exatamente o que o mercado precisa, não grade curricular desatualizada de instituições técnicas.
        - generic [ref=e836]:
          - button "Quais empresas de São José contratam alunos da Escola Habilidade?" [ref=e837] [cursor=pointer]:
            - generic [ref=e838]: Quais empresas de São José contratam alunos da Escola Habilidade?
            - img [ref=e839]
          - generic [ref=e841]: Temos parcerias com escritórios de arquitetura do centro de São José, agências de marketing da região e empresas de tecnologia da Grande Florianópolis. Nossa localização estratégica próxima ao Terminal Central facilita o networking com empresas parceiras que conhecem a qualidade dos nossos alunos.
        - generic [ref=e842]:
          - button "Como funciona o estacionamento para alunos no centro de Kobrasol?" [ref=e843] [cursor=pointer]:
            - generic [ref=e844]: Como funciona o estacionamento para alunos no centro de Kobrasol?
            - img [ref=e845]
          - generic [ref=e847]: Estamos localizados no centro de Kobrasol em uma rua estratégica paralela onde é possível estacionar tranquilamente. Temos vagas gratuitas na rua, incluindo frequentemente na frente da escola. Também somos facilmente acessíveis por transporte público, com várias linhas de ônibus que param próximo à escola.
        - generic [ref=e848]:
          - button "Como faço para me matricular?" [ref=e849] [cursor=pointer]:
            - generic [ref=e850]: Como faço para me matricular?
            - img [ref=e851]
